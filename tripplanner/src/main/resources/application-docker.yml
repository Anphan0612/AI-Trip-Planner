# ==========================================================
# 🐳 Docker-specific Spring Boot Configuration
# ==========================================================
# Activated via: SPRING_PROFILES_ACTIVE=docker
# Overrides default application.yml when running in Docker
# ==========================================================

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:trip}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:tripuser}
    password: ${MYSQL_PASSWORD:trippass123}

  jpa:
    show-sql: false

ai-service:
  url: ${AI_SERVICE_URL:http://ai-service:8000/ai}
