spring:
  application:
    name: tripplanner
  
  # 💾 H2 Database Configuration (For Development)
  datasource:
    url: jdbc:h2:mem:tripplanner_db
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true

server:
  port: 8081

openrouter:
  api:
    key: ${OPENROUTER_API_KEY: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}
