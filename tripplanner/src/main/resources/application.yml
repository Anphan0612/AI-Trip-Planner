spring:
  application:
    name: tripplanner
  
  datasource:
    url: jdbc:postgresql://localhost:5432/tripplanner_db
    username: postgres
    password: YOUR_PASSWORD
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

openrouter:
  api:
    key: YOUR_OPENROUTER_API_KEY
